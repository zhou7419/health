services:
  backend:
    build:
      context: ./backend
    pull_policy: build
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: "sqlite:////app/database/app.db"
      DEEPSEEK_BASE_URL: "https://api.deepseek.com"
      ADMIN_USERNAME: "admin"
    volumes:
      - health-db-data:/app/database
      - ./backend/.env:/app/.env
      - health-logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,json; json.loads(urllib.request.urlopen('http://127.0.0.1:8000/api/v1/stats/health').read())"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  web:
    build:
      context: ./web
    pull_policy: build
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  health-db-data:
    driver: local
  health-logs:
    driver: local
