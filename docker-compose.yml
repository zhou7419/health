services:
  backend:
    build:
      context: ./backend
    image: zhou7419/health-backend:latest
    environment:
      DATABASE_URL: "sqlite:////app/database/app.db"
      DEEPSEEK_BASE_URL: "https://api.deepseek.com"
      # 以下变量建议在 1Panel 面板的【环境变量】中配置，或者通过 .env 文件读取
      # DEEPSEEK_API_KEY: ""
      # SECRET_KEY: ""
      # ADMIN_PASSWORD: ""
      ADMIN_USERNAME: "admin"
    volumes:
      - health-db-data:/app/database
    restart: unless-stopped

  web:
    build:
      context: ./web
    image: zhou7419/health-web:latest
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  health-db-data:
    driver: local