services:
  backend:
    build:
      context: ./backend
    image: zhou7419/health-backend:latest
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: "sqlite:////app/database/app.db"
      DEEPSEEK_BASE_URL: "https://api.deepseek.com"
      ADMIN_USERNAME: "admin"
    volumes:
      - health-db-data:/app/database
      - ./backend/.env:/app/.env
    restart: unless-stopped

  web:
    build:
      context: ./web
    image: zhou7419/health-web:latest
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  health-db-data:
    driver: local